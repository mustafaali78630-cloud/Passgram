<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Passgram Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0084ff; --bg: #ffffff; --chat-bg: #f0f2f5; --text: #1a1a1a; --my-msg: #0084ff; --other-msg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); height: 100vh; overflow: hidden; color: var(--text); }
        .hidden { display: none !important; }

        /* Login UI */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0084ff, #00c6ff); padding: 20px; }
        .login-card { background: white; padding: 35px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .login-card h1 { font-size: 35px; color: var(--primary); font-weight: 800; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 15px; font-size: 16px; background: #f9f9f9; }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }
        .btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        /* App Layout (Single Page Logic) */
        #app-interface { height: 100vh; width: 100vw; position: relative; display: flex; overflow: hidden; }
        
        /* screen-page common */
        .page { height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: white; transition: transform 0.3s ease-in-out; z-index: 10; }
        .page-active { transform: translateX(0); }
        .page-hidden { transform: translateX(100%); }

        /* Header */
        .header { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; }
        .header h2 { font-weight: 700; color: var(--primary); }
        .logout-btn { color: #ff4d4f; font-size: 13px; font-weight: 600; cursor: pointer; }

        /* User List */
        #user-list { padding: 10px; overflow-y: auto; height: calc(100% - 70px); }
        .user-card { display: flex; align-items: center; padding: 15px; border-radius: 18px; margin-bottom: 8px; cursor: pointer; }
        .user-card:active { background: #f0f7ff; }
        .avatar { width: 50px; height: 50px; background: #e7f3ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--primary); margin-right: 15px; font-size: 20px; }
        .user-info h4 { font-size: 16px; font-weight: 600; }
        .user-info p { font-size: 12px; color: #888; }

        /* Chat Page Specific */
        .chat-header { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f0f0f0; background: white; gap: 10px; }
        .back-btn { font-size: 24px; cursor: pointer; padding: 5px; }
        #messages-container { flex: 1; padding: 15px; overflow-y: auto; background: #efe7dd; display: flex; flex-direction: column; gap: 8px; height: calc(100% - 130px); }

        /* Message Bubbles & Actions */
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; position: relative; margin-bottom: 4px; }
        .msg-mine { align-self: flex-end; }
        .msg-theirs { align-self: flex-start; }
        
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14.5px; position: relative; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .mine .bubble { background: var(--my-msg); color: white; border-bottom-right-radius: 4px; }
        .theirs .bubble { background: var(--other-msg); color: #333; border-bottom-left-radius: 4px; }
        .deleted-text { font-style: italic; opacity: 0.7; font-size: 12px; }

        /* Delete Menu */
        .msg-menu { position: absolute; background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); padding: 5px; z-index: 100; display: none; min-width: 120px; }
        .msg-menu button { display: block; width: 100%; padding: 10px; border: none; background: none; text-align: left; font-size: 13px; cursor: pointer; border-radius: 5px; }
        .msg-menu button:hover { background: #f5f5f5; }

        /* Input Bar */
        .chat-input-area { padding: 10px 15px; background: white; border-top: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
        #msg-input { flex: 1; border-radius: 25px; margin: 0; padding: 12px 18px; border: 1px solid #eee; background: #f9f9f9; }
        .send-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen" class="hidden">
        <div class="login-card">
            <h1>Passgram</h1>
            <p>Connect with friends instantly</p>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="authAction()">Join Now</button>
        </div>
    </div>

    <div id="app-interface" class="hidden">
        <div id="list-page" class="page">
            <div class="header">
                <h2>Passgram</h2>
                <span class="logout-btn" onclick="logout()">Logout</span>
            </div>
            <div id="user-list"></div>
        </div>

        <div id="chat-page" class="page page-hidden">
            <div class="chat-header">
                <span class="back-btn" onclick="closeChat()">←</span>
                <div class="avatar" style="width:35px; height:35px; font-size:14px;" id="chat-avatar">?</div>
                <h4 id="chat-name">User</h4>
            </div>
            <div id="messages-container"></div>
            <div id="msg-menu" class="msg-menu">
                <button onclick="deleteMsg('me')">Delete for me</button>
                <button id="del-everyone-btn" onclick="deleteMsg('everyone')" style="color:red;">Delete for everyone</button>
            </div>
            <form class="chat-input-area" onsubmit="sendMsg(event)">
                <input type="text" id="msg-input" placeholder="Message..." autocomplete="off">
                <button type="submit" class="send-btn">➤</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, setDoc, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCe7d3VLwfSygQD8Z0BK5430sarG6ZMC6M",
            authDomain: "passgram-49bf6.firebaseapp.com",
            projectId: "passgram-49bf6",
            storageBucket: "passgram-49bf6.firebasestorage.app",
            messagingSenderId: "385060401630",
            appId: "1:385060401630:web:18fda28052282a80302d4f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let activeFriend = null;
        let chatSub = null;
        let selectedMsgId = null;

        // AUTH
        window.authAction = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p));
        };
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                currentUser = user;
                await setDoc(doc(db, "users", user.email), { email: user.email }, { merge: true });
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-interface').classList.remove('hidden');
                loadUsers();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-interface').classList.add('hidden');
            }
        });

        // USER LIST
        function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const u = d.data();
                    if(u.email !== currentUser.email) {
                        const el = document.createElement('div');
                        el.className = 'user-card';
                        el.innerHTML = `<div class="avatar">${u.email[0].toUpperCase()}</div><div class="user-info"><h4>${u.email.split('@')[0]}</h4><p>Click to chat</p></div>`;
                        el.onclick = () => openChat(u.email);
                        list.appendChild(el);
                    }
                });
            });
        }

        // CHAT ENGINE
        function openChat(email) {
            activeFriend = email;
            document.getElementById('chat-name').innerText = email.split('@')[0];
            document.getElementById('chat-avatar').innerText = email[0].toUpperCase();
            document.getElementById('chat-page').classList.remove('page-hidden');
            
            const roomId = [currentUser.email, email].sort().join('_');
            if(chatSub) chatSub();
            
            const q = query(collection(db, "chats", roomId, "messages"), orderBy("time", "asc"));
            chatSub = onSnapshot(q, (snap) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';
                snap.forEach(mDoc => {
                    const m = mDoc.data();
                    const isMine = m.sender === currentUser.email;
                    
                    // Delete for me check
                    if(m.deletedFor && m.deletedFor.includes(currentUser.email)) return;

                    const wrap = document.createElement('div');
                    wrap.className = `msg-wrapper ${isMine ? 'mine msg-mine' : 'theirs msg-theirs'}`;
                    
                    if(m.isDeleted) {
                        wrap.innerHTML = `<div class="bubble deleted-text">🚫 This message was deleted</div>`;
                    } else {
                        wrap.innerHTML = `<div class="bubble" onclick="showMenu(event, '${mDoc.id}', ${isMine})">${m.text}</div>`;
                    }
                    container.appendChild(wrap);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.closeChat = () => {
            document.getElementById('chat-page').classList.add('page-hidden');
        };

        window.sendMsg = async (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;
            const roomId = [currentUser.email, activeFriend].sort().join('_');
            await addDoc(collection(db, "chats", roomId, "messages"), {
                text: input.value,
                sender: currentUser.email,
                time: serverTimestamp(),
                isDeleted: false,
                deletedFor: []
            });
            input.value = '';
        };

        // DELETE LOGIC
        window.showMenu = (e, msgId, isMine) => {
            selectedMsgId = msgId;
            const menu = document.getElementById('msg-menu');
            menu.style.display = 'block';
            menu.style.top = e.pageY + 'px';
            menu.style.left = (isMine ? e.pageX - 100 : e.pageX) + 'px';
            document.getElementById('del-everyone-btn').style.display = isMine ? 'block' : 'none';
            e.stopPropagation();
        };

        window.deleteMsg = async (type) => {
            const roomId = [currentUser.email, activeFriend].sort().join('_');
            const msgRef = doc(db, "chats", roomId, "messages", selectedMsgId);
            
            if(type === 'me') {
                const snap = await getDoc(msgRef);
                let currentDeletedFor = snap.data().deletedFor || [];
                currentDeletedFor.push(currentUser.email);
                await updateDoc(msgRef, { deletedFor: currentDeletedFor });
            } else {
                await updateDoc(msgRef, { isDeleted: true, text: "" });
            }
            document.getElementById('msg-menu').style.display = 'none';
        };

        document.onclick = () => document.getElementById('msg-menu').style.display = 'none';

    </script>
</body>
</html>
