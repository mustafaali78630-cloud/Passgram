<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Passgram Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #0084ff; 
            --bg: #ffffff; 
            --chat-bg: #efe7dd; 
            --text: #1a1a1a; 
            --my-msg: #0084ff; 
            --other-msg: #ffffff; 
            --border: #f0f0f0;
            --input-bg: #f9f9f9;
        }

        /* Dark Mode Variables */
        .dark-mode {
            --bg: #121212; 
            --chat-bg: #0a0a0a; 
            --text: #ffffff; 
            --my-msg: #005bb5; 
            --other-msg: #2d2d2d;
            --border: #333333;
            --input-bg: #1e1e1e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); position: fixed; transition: background 0.3s, color 0.3s; }
        
        .hidden { display: none !important; }

        /* Login UI */
        #login-screen { height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0084ff, #00c6ff); padding: 20px; }
        .login-card { background: white; padding: 35px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); color: #1a1a1a; }
        .login-card h1 { font-size: 35px; color: var(--primary); font-weight: 800; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 15px; font-size: 16px; background: #f9f9f9; color: #1a1a1a; }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }
        .btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        /* Password Show/Hide */
        .pwd-container { position: relative; }
        .pwd-container i { position: absolute; right: 15px; top: 27px; color: #888; cursor: pointer; font-size: 18px; }

        /* App Layout */
        #app-interface { height: 100%; width: 100%; position: relative; display: flex; overflow: hidden; }
        
        .page { height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: var(--bg); transition: transform 0.3s ease-in-out; z-index: 10; display: flex; flex-direction: column; }
        .page-active { transform: translateX(0); }
        .page-hidden { transform: translateX(100%); }

        /* Header */
        .header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg); flex-shrink: 0; }
        .header h2 { font-weight: 700; color: var(--primary); }
        .settings-btn { font-size: 22px; cursor: pointer; color: var(--text); }

        /* User List */
        #user-list { padding: 10px; overflow-y: auto; flex: 1; }
        .user-card { display: flex; align-items: center; padding: 15px; border-radius: 18px; margin-bottom: 8px; cursor: pointer; }
        .user-card:active { background: var(--border); }
        .avatar { width: 50px; height: 50px; background: #e7f3ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #0084ff; margin-right: 15px; font-size: 20px; flex-shrink: 0; }
        .user-info h4 { font-size: 16px; font-weight: 600; color: var(--text); }
        .user-info p { font-size: 12px; color: #888; }

        /* Bottom Navigation */
        .bottom-nav { display: flex; justify-content: space-around; background: var(--bg); border-top: 1px solid var(--border); padding: 12px 0; padding-bottom: max(12px, env(safe-area-inset-bottom)); flex-shrink: 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 11px; cursor: pointer; gap: 6px; font-weight: 600; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; }

        /* Chat Page Specific */
        .chat-header { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); background: var(--bg); gap: 10px; flex-shrink: 0; color: var(--text); }
        .back-btn { font-size: 20px; cursor: pointer; padding: 5px; color: var(--text); }
        .chat-header-actions { margin-left: auto; position: relative; }
        .dots-btn { font-size: 20px; cursor: pointer; padding: 5px; padding-right: 0; color: var(--text); }
        
        /* Scrollable Container */
        #messages-container { flex: 1; padding: 15px; overflow-y: auto; background: var(--chat-bg); display: flex; flex-direction: column; gap: 8px; }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; position: relative; margin-bottom: 4px; }
        .msg-mine { align-self: flex-end; }
        .msg-theirs { align-self: flex-start; }
        
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14.5px; position: relative; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: inline-flex; align-items: flex-end; gap: 8px;}
        .mine .bubble { background: var(--my-msg); color: white; border-bottom-right-radius: 4px; }
        .theirs .bubble { background: var(--other-msg); color: var(--text); border-bottom-left-radius: 4px; }

        /* Ticks CSS */
        .tick { font-size: 11px; margin-bottom: -2px; }
        .tick-sent { color: rgba(255, 255, 255, 0.7); }
        .tick-delivered { color: rgba(255, 255, 255, 0.9); }
        .tick-read { color: #53bdeb; font-weight: bold; }

        /* Menus */
        .msg-menu { position: absolute; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); padding: 5px; z-index: 100; display: none; min-width: 160px; }
        .msg-menu button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 10px; border: none; background: none; text-align: left; font-size: 13px; font-weight: 500; color: var(--text); cursor: pointer; border-radius: 5px; }
        .msg-menu button:hover { background: var(--border); }
        #chat-header-menu { top: 40px; right: 10px; }

        /* Chat Input Area */
        .chat-input-area { padding: 10px 15px; background: var(--bg); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        #msg-input { flex: 1; border-radius: 25px; margin: 0; padding: 12px 18px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 16px; }
        #msg-input:focus { outline: none; border-color: var(--primary); }
        .send-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

        /* Settings Modal (Scrollable 15 features) */
        #settings-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; justify-content: center; align-items: flex-end; }
        .settings-card { background: var(--bg); padding: 25px 20px; border-top-left-radius: 25px; border-top-right-radius: 25px; width: 100%; max-height: 85vh; overflow-y: auto; text-align: left; box-shadow: 0 -10px 30px rgba(0,0,0,0.2); }
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px;}
        .settings-header h3 { color: var(--text); font-size: 22px; }
        .close-settings-btn { background: none; border: none; font-size: 24px; color: var(--text); cursor: pointer; }
        
        .setting-item { display: flex; align-items: center; padding: 15px 10px; color: var(--text); cursor: pointer; border-bottom: 1px solid var(--border); }
        .setting-item:last-child { border-bottom: none; }
        .setting-item i { width: 30px; font-size: 20px; color: var(--primary); text-align: center; margin-right: 15px; }
        .setting-item span { font-size: 16px; font-weight: 500; flex: 1; }
        
        .setting-danger { color: #ff4d4f !important; }
        .setting-danger i { color: #ff4d4f !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="hidden">
        <div class="login-card">
            <h1>Passgram</h1>
            <p>Connect with friends instantly</p>
            <input type="email" id="email" placeholder="Email">
            <div class="pwd-container">
                <input type="password" id="password" placeholder="Password">
                <i class="fa-solid fa-eye" id="togglePwdIcon" onclick="togglePwd()"></i>
            </div>
            <button class="btn" onclick="authAction()">Join Now</button>
        </div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="settings-card">
            <div class="settings-header">
                <h3>Settings</h3>
                <button class="close-settings-btn" onclick="closeSettings()"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="setting-item" onclick="toggleTheme()">
                <i class="fa-solid fa-moon"></i><span>Dark/Light Mode</span>
            </div>
            <div class="setting-item">
                <i class="fa-solid fa-key"></i><span>Account</span>
            </div>
            <div class="setting-item">
                <i class="fa-solid fa-shield-halved"></i><span>Privacy</span>
            </div>
            <div class="setting-item">
                <i class="fa-solid fa-user-circle"></i><span>Avatar</span>
            </div>
            <div class="setting-item">
                <i class="fa-solid fa-message"></i><span>Chats</span>
            </div>
            <div class="setting-item">
                <i class="fa-solid fa-bell"></i><span>Notifications</span>
            </div>
            <div class="setting-item">
                <i class="fa-solid fa-database"></i><span>Storage and data</span>
            </div>
            <div class="setting-item">
                <i class="fa-solid fa-globe"></i><span>App Language</span>
            </div>
            <div class="setting-item">
                <i class="fa-solid fa-circle-info"></i><span>Help</span>
            </div>
            <div class="setting-item">
                <i class="fa-solid fa-user-plus"></i><span>Invite a friend</span>
            </div>
            <div class="setting-item">
                <i class="fa-solid fa-lock"></i><span>Security settings</span>
            </div>
            <div class="setting-item">
                <i class="fa-solid fa-fingerprint"></i><span>Two-step verification</span>
            </div>
            <div class="setting-item">
                <i class="fa-solid fa-laptop-code"></i><span>App Updates</span>
            </div>
            <div class="setting-item">
                <i class="fa-solid fa-star"></i><span>Starred Messages</span>
            </div>
            <div class="setting-item setting-danger" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i><span>Logout</span>
            </div>
        </div>
    </div>

    <div id="app-interface" class="hidden">
        <div id="list-page" class="page">
            <div class="header">
                <h2>Passgram</h2>
                <span class="settings-btn" onclick="openSettings()"><i class="fa-solid fa-gear"></i></span>
            </div>
            <div id="user-list"></div>
            
            <div class="bottom-nav">
                <div class="nav-item active">
                    <i class="fa-solid fa-comment-dots"></i>
                    <span>Chats</span>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-circle-notch"></i>
                    <span>Status</span>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-plus-circle"></i>
                    <span>Create</span>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-users"></i>
                    <span>Groups</span>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-user"></i>
                    <span>Profile</span>
                </div>
            </div>
        </div>

        <div id="chat-page" class="page page-hidden">
            <div class="chat-header">
                <span class="back-btn" onclick="closeChat()"><i class="fa-solid fa-arrow-left"></i></span>
                <div class="avatar" style="width:35px; height:35px; font-size:14px;" id="chat-avatar">?</div>
                <h4 id="chat-name" style="flex:1;">User</h4>
                
                <div class="chat-header-actions">
                    <span class="dots-btn" onclick="toggleHeaderMenu(event)"><i class="fa-solid fa-ellipsis-vertical"></i></span>
                    <div id="chat-header-menu" class="msg-menu">
                        <button onclick="clearChatHistory()" style="color: #ff4d4f;">
                            <i class="fa-solid fa-trash-can"></i> Clear all history
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="messages-container"></div>
            
            <div id="msg-menu" class="msg-menu">
                <button onclick="deleteMsg('me')"><i class="fa-solid fa-eye-slash"></i> Delete for me</button>
                <button id="del-everyone-btn" onclick="deleteMsg('everyone')" style="color:#ff4d4f;"><i class="fa-solid fa-trash-can"></i> Delete for everyone</button>
            </div>
            
            <form class="chat-input-area" onsubmit="sendMsg(event)">
                <input type="text" id="msg-input" placeholder="Message..." autocomplete="off">
                <button type="submit" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, setDoc, doc, updateDoc, deleteDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCe7d3VLwfSygQD8Z0BK5430sarG6ZMC6M",
            authDomain: "passgram-49bf6.firebaseapp.com",
            projectId: "passgram-49bf6",
            storageBucket: "passgram-49bf6.firebasestorage.app",
            messagingSenderId: "385060401630",
            appId: "1:385060401630:web:18fda28052282a80302d4f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let activeFriend = null;
        let chatSub = null;
        let selectedMsgId = null;

        // SHOW/HIDE PASSWORD
        window.togglePwd = () => {
            const pwdInput = document.getElementById('password');
            const icon = document.getElementById('togglePwdIcon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                pwdInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        };

        // AUTH & SETTINGS
        window.authAction = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Enter details");
            signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p));
        };
        
        window.logout = () => {
            closeSettings();
            signOut(auth);
        };

        window.openSettings = () => {
            document.getElementById('settings-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('settings-modal').style.opacity = '1'; }, 10);
        };
        
        window.closeSettings = () => {
            document.getElementById('settings-modal').classList.add('hidden');
        };
        
        window.toggleTheme = () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        if(localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                currentUser = user;
                await setDoc(doc(db, "users", user.email), { email: user.email }, { merge: true });
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-interface').classList.remove('hidden');
                loadUsers();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-interface').classList.add('hidden');
            }
        });

        // USER LIST
        function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const u = d.data();
                    if(u.email !== currentUser.email) {
                        const el = document.createElement('div');
                        el.className = 'user-card';
                        el.innerHTML = `<div class="avatar">${u.email[0].toUpperCase()}</div><div class="user-info"><h4>${u.email.split('@')[0]}</h4><p>Click to chat</p></div>`;
                        el.onclick = () => openChat(u.email);
                        list.appendChild(el);
                    }
                });
            });
        }

        // CHAT ENGINE
        function openChat(email) {
            activeFriend = email;
            document.getElementById('chat-name').innerText = email.split('@')[0];
            document.getElementById('chat-avatar').innerText = email[0].toUpperCase();
            document.getElementById('chat-page').classList.remove('page-hidden');
            
            const roomId = [currentUser.email, email].sort().join('_');
            if(chatSub) chatSub();
            
            const q = query(collection(db, "chats", roomId, "messages"), orderBy("time", "asc"));
            chatSub = onSnapshot(q, (snap) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';
                snap.forEach(mDoc => {
                    const m = mDoc.data();
                    const isMine = m.sender === currentUser.email;
                    
                    if(!isMine && m.status !== 'read') {
                        updateDoc(doc(db, "chats", roomId, "messages", mDoc.id), { status: 'read' });
                    }

                    if(m.deletedFor && m.deletedFor.includes(currentUser.email)) return;

                    const wrap = document.createElement('div');
                    wrap.className = `msg-wrapper ${isMine ? 'mine msg-mine' : 'theirs msg-theirs'}`;
                    
                    let ticksHtml = '';
                    if(isMine) {
                        if(m.status === 'read') {
                            ticksHtml = `<span class="tick tick-read">✓✓</span>`;
                        } else if(m.status === 'delivered') {
                            ticksHtml = `<span class="tick tick-delivered">✓✓</span>`;
                        } else {
                            ticksHtml = `<span class="tick tick-sent">✓</span>`;
                        }
                    }

                    wrap.innerHTML = `<div class="bubble" onclick="showMenu(event, '${mDoc.id}', ${isMine})">
                        <span>${m.text}</span> ${ticksHtml}
                    </div>`;
                    
                    container.appendChild(wrap);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.closeChat = () => {
            document.getElementById('chat-page').classList.add('page-hidden');
            if(chatSub) chatSub();
        };

        window.sendMsg = async (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(!val) return;
            const roomId = [currentUser.email, activeFriend].sort().join('_');
            input.value = ''; 
            
            await addDoc(collection(db, "chats", roomId, "messages"), {
                text: val,
                sender: currentUser.email,
                time: serverTimestamp(),
                status: 'sent',
                deletedFor: []
            });
        };

        // CLEAR CHAT HISTORY (3 DOTS)
        window.toggleHeaderMenu = (e) => {
            const menu = document.getElementById('chat-header-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            e.stopPropagation();
        };

        window.clearChatHistory = async () => {
            const confirmDelete = confirm("Are you sure you want to clear this entire chat history for EVERYONE? This cannot be undone.");
            if(!confirmDelete) return;

            document.getElementById('chat-header-menu').style.display = 'none';
            const roomId = [currentUser.email, activeFriend].sort().join('_');
            
            // Get all messages and delete them one by one
            const q = query(collection(db, "chats", roomId, "messages"));
            const querySnapshot = await getDocs(q);
            querySnapshot.forEach(async (documentSnap) => {
                await deleteDoc(doc(db, "chats", roomId, "messages", documentSnap.id));
            });
        };

        // DELETE SINGLE MSG LOGIC
        window.showMenu = (e, msgId, isMine) => {
            selectedMsgId = msgId;
            const menu = document.getElementById('msg-menu');
            menu.style.display = 'block';
            menu.style.top = e.pageY + 'px';
            menu.style.left = Math.min(e.pageX, window.innerWidth - 170) + 'px';
            document.getElementById('del-everyone-btn').style.display = isMine ? 'flex' : 'none';
            e.stopPropagation();
        };

        window.deleteMsg = async (type) => {
            const roomId = [currentUser.email, activeFriend].sort().join('_');
            const msgRef = doc(db, "chats", roomId, "messages", selectedMsgId);
            
            if(type === 'me') {
                const snap = await getDoc(msgRef);
                let currentDeletedFor = snap.data().deletedFor || [];
                currentDeletedFor.push(currentUser.email);
                await updateDoc(msgRef, { deletedFor: currentDeletedFor });
            } else {
                await deleteDoc(msgRef);
            }
            document.getElementById('msg-menu').style.display = 'none';
        };

        // Close dropdowns on outside click
        document.onclick = (e) => {
            if(!e.target.closest('.msg-menu') && !e.target.closest('.bubble')) {
                document.getElementById('msg-menu').style.display = 'none';
            }
            if(!e.target.closest('#chat-header-menu') && !e.target.closest('.dots-btn')) {
                document.getElementById('chat-header-menu').style.display = 'none';
            }
        };

    </script>
</body>
</html>
