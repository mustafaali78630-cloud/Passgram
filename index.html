<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Passgram Pro</title>
  
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Passgram%20Pro%22,%22short_name%22:%22Passgram%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%230084ff%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/5968/5968771.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968771.png">
    <meta name="theme-color" content="#0084ff">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #0084ff; --bg: #ffffff; --chat-bg: #efe7dd; --text: #1a1a1a; --my-msg: #0084ff; --other-msg: #ffffff; --border: #f0f0f0; --input-bg: #f9f9f9; }
        .dark-mode { --bg: #121212; --chat-bg: #0a0a0a; --text: #ffffff; --my-msg: #005bb5; --other-msg: #2d2d2d; --border: #333333; --input-bg: #1e1e1e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); position: fixed; transition: background 0.3s, color 0.3s; }
        .hidden { display: none !important; }
        #login-screen { height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0084ff, #00c6ff); padding: 20px; z-index: 2000; position: relative; }
        .login-card { background: white; padding: 35px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); color: #1a1a1a; }
        .login-card h1 { font-size: 35px; color: var(--primary); font-weight: 800; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 15px; font-size: 16px; background: #f9f9f9; color: #1a1a1a; }
        .pwd-container { position: relative; }
        .pwd-container i { position: absolute; right: 15px; top: 27px; color: #888; cursor: pointer; font-size: 18px; }
        .btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #app-interface { height: 100%; width: 100%; position: relative; display: flex; overflow: hidden; }
        .page { height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: var(--bg); transition: transform 0.3s ease-in-out; z-index: 10; display: flex; flex-direction: column; }
        .page-hidden { transform: translateX(100%); }
        .header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg); flex-shrink: 0; }
        .header h2 { font-weight: 700; color: var(--primary); }
        .settings-btn { font-size: 22px; cursor: pointer; color: var(--text); }
        #user-list { padding: 10px; overflow-y: auto; flex: 1; }
        .user-card { display: flex; align-items: center; padding: 15px; border-radius: 18px; margin-bottom: 8px; cursor: pointer; }
        .user-card:active { background: var(--border); }
        .avatar { width: 50px; height: 50px; background: #e7f3ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #0084ff; margin-right: 15px; font-size: 20px; flex-shrink: 0; }
        .user-info h4 { font-size: 16px; font-weight: 600; color: var(--text); }
        .bottom-nav { display: flex; justify-content: space-around; background: var(--bg); border-top: 1px solid var(--border); padding: 12px 0; padding-bottom: max(12px, env(safe-area-inset-bottom)); flex-shrink: 0; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 11px; cursor: pointer; gap: 6px; font-weight: 600; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; }
        .chat-header { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); background: var(--bg); gap: 10px; flex-shrink: 0; color: var(--text); }
        .back-btn { font-size: 20px; cursor: pointer; padding: 5px; color: var(--text); }
        .dots-btn { font-size: 20px; cursor: pointer; padding: 5px; color: var(--text); }
        #messages-container { flex: 1; padding: 15px; overflow-y: auto; background: var(--chat-bg); display: flex; flex-direction: column; gap: 8px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; position: relative; margin-bottom: 4px; }
        .msg-mine { align-self: flex-end; }
        .msg-theirs { align-self: flex-start; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14.5px; position: relative; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: inline-flex; align-items: flex-end; gap: 8px; }
        .mine .bubble { background: var(--my-msg); color: white; border-bottom-right-radius: 4px; }
        .theirs .bubble { background: var(--other-msg); color: var(--text); border-bottom-left-radius: 4px; }
        .tick { font-size: 11px; margin-bottom: -2px; }
        .tick-read { color: #53bdeb; font-weight: bold; }
        .msg-menu { position: absolute; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); padding: 5px; z-index: 100; display: none; min-width: 160px; }
        .msg-menu button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 10px; border: none; background: none; font-size: 13px; color: var(--text); cursor: pointer; border-radius: 5px; }
        .chat-input-area { padding: 10px 15px; background: var(--bg); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        #msg-input { flex: 1; border-radius: 25px; padding: 12px 18px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 16px; outline: none; }
        .send-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #settings-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 3000; display: flex; justify-content: center; align-items: flex-end; }
        .settings-card { background: var(--bg); padding: 25px 20px; border-top-left-radius: 25px; border-top-right-radius: 25px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 -10px 30px rgba(0,0,0,0.2); }
        .setting-item { display: flex; align-items: center; padding: 15px 10px; color: var(--text); cursor: pointer; border-bottom: 1px solid var(--border); }
        .setting-item i { width: 30px; font-size: 20px; color: var(--primary); margin-right: 15px; text-align: center; }
        .setting-danger { color: #ff4d4f !important; }

        .clock-container { flex: 1; display: flex; justify-content: center; align-items: center; background: var(--bg); }
        .clock { width: 220px; height: 220px; border: 8px solid var(--primary); border-radius: 50%; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; background: var(--text); }
        .hour-hand { width: 6px; height: 50px; z-index: 3; }
        .min-hand { width: 4px; height: 75px; z-index: 2; }
        .sec-hand { width: 2px; height: 85px; background: #ff4d4f; z-index: 1; }
        .center-dot { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: var(--primary); border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>Passgram</h1>
            <p id="login-msg">Connect with friends instantly</p>
            <input type="email" id="email" placeholder="Email">
            <div class="pwd-container">
                <input type="password" id="password" placeholder="Password">
                <i class="fa-solid fa-eye" id="togglePwdIcon" onclick="togglePwd()"></i>
            </div>
            <button class="btn" id="login-btn" onclick="authAction()">Join Now</button>
        </div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="settings-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h3>Settings</h3>
                <i class="fa-solid fa-times" onclick="closeSettings()" style="font-size:24px; cursor:pointer;"></i>
            </div>
            <div class="setting-item" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i><span>Dark Mode</span></div>
            <div class="setting-item setting-danger" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></div>
        </div>
    </div>

    <div id="app-interface" class="hidden">
        <div id="list-page" class="page">
            <div class="header">
                <h2 id="page-title">Passgram</h2>
                <span class="settings-btn" onclick="openSettings()"><i class="fa-solid fa-gear"></i></span>
            </div>
            <div id="user-list"></div>
            <div id="clock-page" class="clock-container hidden">
                <div class="clock">
                    <div class="hand hour-hand" id="hour"></div>
                    <div class="hand min-hand" id="minutes"></div>
                    <div class="hand sec-hand" id="seconds"></div>
                    <div class="center-dot"></div>
                </div>
            </div>
            <div class="bottom-nav">
                <div class="nav-item active" onclick="switchTab('chats', this)"><i class="fa-solid fa-comment-dots"></i><span>Chats</span></div>
                <div class="nav-item" onclick="switchTab('status', this)"><i class="fa-solid fa-circle-notch"></i><span>Status</span></div>
                <div class="nav-item" onclick="switchTab('clock', this)"><i class="fa-solid fa-clock"></i><span>Clock</span></div>
                <div class="nav-item" onclick="switchTab('groups', this)"><i class="fa-solid fa-users"></i><span>Groups</span></div>
                <div class="nav-item" onclick="switchTab('profile', this)"><i class="fa-solid fa-user"></i><span>Profile</span></div>
            </div>
        </div>

        <div id="chat-page" class="page page-hidden">
            <div class="chat-header">
                <i class="fa-solid fa-arrow-left back-btn" onclick="closeChat()"></i>
                <div class="avatar" style="width:35px; height:35px; font-size:14px;" id="chat-avatar">?</div>
                <h4 id="chat-name" style="flex:1;">User</h4>
                <div style="position:relative;">
                    <i class="fa-solid fa-ellipsis-vertical dots-btn" onclick="toggleHeaderMenu(event)"></i>
                    <div id="chat-header-menu" class="msg-menu" style="top:35px; right:0;">
                        <button onclick="clearChatHistory()" style="color:#ff4d4f;"><i class="fa-solid fa-trash"></i> Clear History</button>
                    </div>
                </div>
            </div>
            <div id="messages-container"></div>
            <div id="msg-menu" class="msg-menu">
                <button onclick="deleteMsg('me')"><i class="fa-solid fa-eye-slash"></i> Delete for me</button>
                <button id="del-everyone-btn" onclick="deleteMsg('everyone')" style="color:#ff4d4f;"><i class="fa-solid fa-trash"></i> Delete for everyone</button>
            </div>
            <form class="chat-input-area" onsubmit="sendMsg(event)">
                <input type="text" id="msg-input" placeholder="Message..." autocomplete="off">
                <button type="submit" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, setDoc, doc, updateDoc, deleteDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCe7d3VLwfSygQD8Z0BK5430sarG6ZMC6M",
            authDomain: "passgram-49bf6.firebaseapp.com",
            projectId: "passgram-49bf6",
            storageBucket: "passgram-49bf6.firebasestorage.app",
            messagingSenderId: "385060401630",
            appId: "1:385060401630:web:18fda28052282a80302d4f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null, activeFriend = null, chatSub = null, selectedMsgId = null;

        window.switchTab = (tab, el) => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            const userList = document.getElementById('user-list');
            const clockPage = document.getElementById('clock-page');
            const title = document.getElementById('page-title');
            if(tab === 'clock') {
                userList.classList.add('hidden');
                clockPage.classList.remove('hidden');
                title.innerText = "Analog Clock";
            } else if(tab === 'chats') {
                userList.classList.remove('hidden');
                clockPage.classList.add('hidden');
                title.innerText = "Passgram";
                loadUsers();
            } else {
                clockPage.classList.add('hidden');
                userList.classList.remove('hidden');
                userList.innerHTML = `<div style="padding:50px; text-align:center; color:#888;">${tab.toUpperCase()} Section Coming Soon...</div>`;
                title.innerText = tab.charAt(0).toUpperCase() + tab.slice(1);
            }
        };

        setInterval(() => {
            const d = new Date();
            const h = d.getHours();
            const m = d.getMinutes();
            const s = d.getSeconds();
            if(document.getElementById('hour')) {
                document.getElementById('hour').style.transform = `translateX(-50%) rotate(${30 * h + m / 2}deg)`;
                document.getElementById('minutes').style.transform = `translateX(-50%) rotate(${6 * m}deg)`;
                document.getElementById('seconds').style.transform = `translateX(-50%) rotate(${6 * s}deg)`;
            }
        }, 1000);

        window.togglePwd = () => {
            const p = document.getElementById('password');
            const i = document.getElementById('togglePwdIcon');
            p.type = p.type === 'password' ? 'text' : 'password';
            i.classList.toggle('fa-eye'); i.classList.toggle('fa-eye-slash');
        };

        window.authAction = () => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const msg = document.getElementById('login-msg');
            if(!e || !p) return alert("Fill all fields");
            btn.disabled = true;
            btn.innerText = "Connecting...";
            msg.innerText = "Checking credentials...";
            msg.style.color = "inherit";

            signInWithEmailAndPassword(auth, e, p)
            .catch((error) => {
                if(error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    createUserWithEmailAndPassword(auth, e, p).catch(err => {
                        msg.innerText = "Error: " + err.message;
                        msg.style.color = "#ff4d4f";
                        btn.disabled = false;
                        btn.innerText = "Join Now";
                    });
                } else {
                    msg.innerText = "Incorrect Password! Try again.";
                    msg.style.color = "#ff4d4f";
                    btn.disabled = false;
                    btn.innerText = "Join Now";
                }
            });
        };

        onAuthStateChanged(auth, async (u) => {
            if(u) {
                currentUser = u;
                await setDoc(doc(db, "users", u.email), { email: u.email }, { merge: true });
                document.getElementById('login-screen').classList.add('hidden'); 
                document.getElementById('app-interface').classList.remove('hidden');
                loadUsers();
            } else {
                currentUser = null;
                // Reset Login UI on logout
                const btn = document.getElementById('login-btn');
                const msg = document.getElementById('login-msg');
                if(btn) { btn.disabled = false; btn.innerText = "Join Now"; }
                if(msg) { msg.innerText = "Connect with friends instantly"; msg.style.color = "inherit"; }
                document.getElementById('login-screen').classList.remove('hidden'); 
                document.getElementById('app-interface').classList.add('hidden');
            }
        });

        function loadUsers() {
            onSnapshot(collection(db, "users"), (s) => {
                const l = document.getElementById('user-list');
                if(!l || l.classList.contains('hidden')) return;
                l.innerHTML = '';
                s.forEach(d => {
                    const u = d.data();
                    if(u.email !== currentUser?.email) {
                        const e = document.createElement('div'); e.className = 'user-card';
                        e.innerHTML = `<div class="avatar">${u.email[0].toUpperCase()}</div><div class="user-info"><h4>${u.email.split('@')[0]}</h4><p>Online</p></div>`;
                        e.onclick = () => openChat(u.email); l.appendChild(e);
                    }
                });
            });
        }

        window.openChat = (email) => {
            activeFriend = email; document.getElementById('chat-name').innerText = email.split('@')[0];
            document.getElementById('chat-avatar').innerText = email[0].toUpperCase();
            document.getElementById('chat-page').classList.remove('page-hidden');
            const rid = [currentUser.email, email].sort().join('_');
            if(chatSub) chatSub();
            const q = query(collection(db, "chats", rid, "messages"), orderBy("time", "asc"));
            chatSub = onSnapshot(q, (sn) => {
                const c = document.getElementById('messages-container'); c.innerHTML = '';
                sn.forEach(d => {
                    const m = d.data(); const isM = m.sender === currentUser.email;
                    if(!isM && m.status !== 'read') updateDoc(doc(db, "chats", rid, "messages", d.id), { status: 'read' });
                    if(m.deletedFor && m.deletedFor.includes(currentUser.email)) return;
                    const w = document.createElement('div'); w.className = `msg-wrapper ${isM ? 'mine msg-mine' : 'theirs msg-theirs'}`;
                    let t = isM ? `<span class="tick ${m.status==='read'?'tick-read':''}">✓${m.status==='read'?'✓':''}</span>` : '';
                    w.innerHTML = `<div class="bubble" onclick="showMenu(event, '${d.id}', ${isM})"><span>${m.text}</span>${t}</div>`;
                    c.appendChild(w);
                });
                c.scrollTop = c.scrollHeight;
            });
        };

        window.closeChat = () => { document.getElementById('chat-page').classList.add('page-hidden'); if(chatSub) chatSub(); };
        window.sendMsg = async (e) => {
            e.preventDefault(); const i = document.getElementById('msg-input'); const v = i.value.trim(); if(!v) return;
            const rid = [currentUser.email, activeFriend].sort().join('_'); i.value = '';
            await addDoc(collection(db, "chats", rid, "messages"), { text: v, sender: currentUser.email, time: serverTimestamp(), status: 'sent', deletedFor: [] });
        };

        window.logout = () => { closeSettings(); signOut(auth); };
        window.openSettings = () => document.getElementById('settings-modal').classList.remove('hidden');
        window.closeSettings = () => document.getElementById('settings-modal').classList.add('hidden');
        window.toggleTheme = () => { document.body.classList.toggle('dark-mode'); };
        window.toggleHeaderMenu = (e) => { const m = document.getElementById('chat-header-menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; e.stopPropagation(); };
        window.clearChatHistory = async () => {
            if(!confirm("Clear all messages for everyone?")) return;
            const rid = [currentUser.email, activeFriend].sort().join('_');
            const q = await getDocs(query(collection(db, "chats", rid, "messages")));
            q.forEach(d => deleteDoc(doc(db, "chats", rid, "messages", d.id)));
        };

        window.showMenu = (e, id, isM) => {
            selectedMsgId = id; const m = document.getElementById('msg-menu'); m.style.display = 'block';
            m.style.top = e.pageY + 'px'; m.style.left = Math.min(e.pageX, window.innerWidth - 170) + 'px';
            document.getElementById('del-everyone-btn').style.display = isM ? 'flex' : 'none'; e.stopPropagation();
        };

        window.deleteMsg = async (t) => {
            const rid = [currentUser.email, activeFriend].sort().join('_'); const ref = doc(db, "chats", rid, "messages", selectedMsgId);
            if(t === 'me') {
                const s = await getDoc(ref); let d = s.data().deletedFor || []; d.push(currentUser.email); await updateDoc(ref, { deletedFor: d });
            } else await deleteDoc(ref);
            document.getElementById('msg-menu').style.display = 'none';
        };

        document.onclick = () => { 
            if(document.getElementById('msg-menu')) document.getElementById('msg-menu').style.display = 'none'; 
            if(document.getElementById('chat-header-menu')) document.getElementById('chat-header-menu').style.display = 'none'; 
        };
    </script>
</body>
</html>
