<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Passgram Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0084ff; 
            --bg: #ffffff; 
            --chat-bg: #efe7dd; 
            --text: #1a1a1a; 
            --my-msg: #0084ff; 
            --other-msg: #ffffff; 
            --border: #f0f0f0;
            --input-bg: #f9f9f9;
        }

        /* Dark Mode Variables */
        .dark-mode {
            --bg: #121212; 
            --chat-bg: #0a0a0a; 
            --text: #ffffff; 
            --my-msg: #005bb5; 
            --other-msg: #2d2d2d;
            --border: #333333;
            --input-bg: #1e1e1e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); position: fixed; transition: background 0.3s, color 0.3s; }
        
        .hidden { display: none !important; }

        /* Login UI */
        #login-screen { height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0084ff, #00c6ff); padding: 20px; }
        .login-card { background: white; padding: 35px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); color: #1a1a1a; }
        .login-card h1 { font-size: 35px; color: var(--primary); font-weight: 800; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 15px; font-size: 16px; background: #f9f9f9; color: #1a1a1a; }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }
        .btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        /* App Layout */
        #app-interface { height: 100%; width: 100%; position: relative; display: flex; overflow: hidden; }
        
        .page { height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: var(--bg); transition: transform 0.3s ease-in-out; z-index: 10; display: flex; flex-direction: column; }
        .page-active { transform: translateX(0); }
        .page-hidden { transform: translateX(100%); }

        /* Header */
        .header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg); flex-shrink: 0; }
        .header h2 { font-weight: 700; color: var(--primary); }
        .settings-btn { font-size: 22px; cursor: pointer; }

        /* User List */
        #user-list { padding: 10px; overflow-y: auto; flex: 1; }
        .user-card { display: flex; align-items: center; padding: 15px; border-radius: 18px; margin-bottom: 8px; cursor: pointer; }
        .user-card:active { background: var(--border); }
        .avatar { width: 50px; height: 50px; background: #e7f3ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #0084ff; margin-right: 15px; font-size: 20px; flex-shrink: 0; }
        .user-info h4 { font-size: 16px; font-weight: 600; color: var(--text); }
        .user-info p { font-size: 12px; color: #888; }

        /* Chat Page Specific */
        .chat-header { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); background: var(--bg); gap: 10px; flex-shrink: 0; color: var(--text); }
        .back-btn { font-size: 24px; cursor: pointer; padding: 5px; }
        
        /* Scrollable Container */
        #messages-container { flex: 1; padding: 15px; overflow-y: auto; background: var(--chat-bg); display: flex; flex-direction: column; gap: 8px; }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 80%; position: relative; margin-bottom: 4px; }
        .msg-mine { align-self: flex-end; }
        .msg-theirs { align-self: flex-start; }
        
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14.5px; position: relative; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: inline-flex; align-items: flex-end; gap: 8px;}
        .mine .bubble { background: var(--my-msg); color: white; border-bottom-right-radius: 4px; }
        .theirs .bubble { background: var(--other-msg); color: var(--text); border-bottom-left-radius: 4px; }

        /* Ticks CSS */
        .tick { font-size: 11px; margin-bottom: -2px; }
        .tick-sent { color: rgba(255, 255, 255, 0.7); }
        .tick-delivered { color: rgba(255, 255, 255, 0.9); }
        .tick-read { color: #53bdeb; font-weight: bold; } /* Blue Ticks */

        /* Menu */
        .msg-menu { position: absolute; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); padding: 5px; z-index: 100; display: none; min-width: 140px; }
        .msg-menu button { display: block; width: 100%; padding: 10px; border: none; background: none; text-align: left; font-size: 13px; font-weight: 500; color: var(--text); cursor: pointer; border-radius: 5px; }
        .msg-menu button:hover { background: var(--border); }

        /* Chat Input Area */
        .chat-input-area { 
            padding: 10px 15px; 
            background: var(--bg); 
            border-top: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            flex-shrink: 0;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }
        #msg-input { flex: 1; border-radius: 25px; margin: 0; padding: 12px 18px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 16px; }
        #msg-input:focus { outline: none; border-color: var(--primary); }
        .send-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

        /* Settings Modal */
        #settings-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .settings-card { background: var(--bg); padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .settings-card h3 { margin-bottom: 20px; color: var(--text); }
        .settings-card button { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; }
        .btn-theme { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); }
        .btn-logout { background: #ff4d4f; color: white; }
        .btn-close { background: transparent; color: #888; margin-bottom: 0 !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="hidden">
        <div class="login-card">
            <h1>Passgram</h1>
            <p>Connect with friends instantly</p>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="authAction()">Join Now</button>
        </div>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="settings-card">
            <h3>Settings</h3>
            <button class="btn-theme" onclick="toggleTheme()">🌗 Toggle Dark/Light Mode</button>
            <button class="btn-logout" onclick="logout()">🚪 Logout</button>
            <button class="btn-close" onclick="closeSettings()">Cancel</button>
        </div>
    </div>

    <div id="app-interface" class="hidden">
        <div id="list-page" class="page">
            <div class="header">
                <h2>Passgram</h2>
                <span class="settings-btn" onclick="openSettings()">⚙️</span>
            </div>
            <div id="user-list"></div>
        </div>

        <div id="chat-page" class="page page-hidden">
            <div class="chat-header">
                <span class="back-btn" onclick="closeChat()">←</span>
                <div class="avatar" style="width:35px; height:35px; font-size:14px;" id="chat-avatar">?</div>
                <h4 id="chat-name">User</h4>
            </div>
            <div id="messages-container"></div>
            <div id="msg-menu" class="msg-menu">
                <button onclick="deleteMsg('me')">Delete for me</button>
                <button id="del-everyone-btn" onclick="deleteMsg('everyone')" style="color:#ff4d4f;">Delete for everyone</button>
            </div>
            <form class="chat-input-area" onsubmit="sendMsg(event)">
                <input type="text" id="msg-input" placeholder="Message..." autocomplete="off">
                <button type="submit" class="send-btn">➤</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, setDoc, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCe7d3VLwfSygQD8Z0BK5430sarG6ZMC6M",
            authDomain: "passgram-49bf6.firebaseapp.com",
            projectId: "passgram-49bf6",
            storageBucket: "passgram-49bf6.firebasestorage.app",
            messagingSenderId: "385060401630",
            appId: "1:385060401630:web:18fda28052282a80302d4f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let activeFriend = null;
        let chatSub = null;
        let selectedMsgId = null;

        // AUTH & SETTINGS
        window.authAction = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Enter details");
            signInWithEmailAndPassword(auth, e, p).catch(() => createUserWithEmailAndPassword(auth, e, p));
        };
        
        window.logout = () => {
            closeSettings();
            signOut(auth);
        };

        window.openSettings = () => document.getElementById('settings-modal').classList.remove('hidden');
        window.closeSettings = () => document.getElementById('settings-modal').classList.add('hidden');
        
        window.toggleTheme = () => {
            document.body.classList.toggle('dark-mode');
            // Save preference to localStorage if you want it to remember
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        // Load saved theme
        if(localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        onAuthStateChanged(auth, async (user) => {
            if(user) {
                currentUser = user;
                await setDoc(doc(db, "users", user.email), { email: user.email }, { merge: true });
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-interface').classList.remove('hidden');
                loadUsers();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-interface').classList.add('hidden');
            }
        });

        // USER LIST
        function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const u = d.data();
                    if(u.email !== currentUser.email) {
                        const el = document.createElement('div');
                        el.className = 'user-card';
                        el.innerHTML = `<div class="avatar">${u.email[0].toUpperCase()}</div><div class="user-info"><h4>${u.email.split('@')[0]}</h4><p>Click to chat</p></div>`;
                        el.onclick = () => openChat(u.email);
                        list.appendChild(el);
                    }
                });
            });
        }

        // CHAT ENGINE
        function openChat(email) {
            activeFriend = email;
            document.getElementById('chat-name').innerText = email.split('@')[0];
            document.getElementById('chat-avatar').innerText = email[0].toUpperCase();
            document.getElementById('chat-page').classList.remove('page-hidden');
            
            const roomId = [currentUser.email, email].sort().join('_');
            if(chatSub) chatSub();
            
            const q = query(collection(db, "chats", roomId, "messages"), orderBy("time", "asc"));
            chatSub = onSnapshot(q, (snap) => {
                const container = document.getElementById('messages-container');
                container.innerHTML = '';
                snap.forEach(mDoc => {
                    const m = mDoc.data();
                    const isMine = m.sender === currentUser.email;
                    
                    // Mark as read if the message is from the friend and currently not read
                    if(!isMine && m.status !== 'read') {
                        updateDoc(doc(db, "chats", roomId, "messages", mDoc.id), { status: 'read' });
                    }

                    if(m.deletedFor && m.deletedFor.includes(currentUser.email)) return;

                    const wrap = document.createElement('div');
                    wrap.className = `msg-wrapper ${isMine ? 'mine msg-mine' : 'theirs msg-theirs'}`;
                    
                    // Generate Ticks HTML only for your messages
                    let ticksHtml = '';
                    if(isMine) {
                        if(m.status === 'read') {
                            ticksHtml = `<span class="tick tick-read">✓✓</span>`;
                        } else if(m.status === 'delivered') {
                            ticksHtml = `<span class="tick tick-delivered">✓✓</span>`;
                        } else {
                            ticksHtml = `<span class="tick tick-sent">✓</span>`;
                        }
                    }

                    wrap.innerHTML = `<div class="bubble" onclick="showMenu(event, '${mDoc.id}', ${isMine})">
                        <span>${m.text}</span> ${ticksHtml}
                    </div>`;
                    
                    container.appendChild(wrap);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.closeChat = () => {
            document.getElementById('chat-page').classList.add('page-hidden');
            if(chatSub) chatSub();
        };

        window.sendMsg = async (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(!val) return;
            const roomId = [currentUser.email, activeFriend].sort().join('_');
            input.value = ''; 
            
            // Send msg with status 'sent'
            await addDoc(collection(db, "chats", roomId, "messages"), {
                text: val,
                sender: currentUser.email,
                time: serverTimestamp(),
                status: 'sent',
                deletedFor: []
            });
        };

        // DELETE LOGIC
        window.showMenu = (e, msgId, isMine) => {
            selectedMsgId = msgId;
            const menu = document.getElementById('msg-menu');
            menu.style.display = 'block';
            menu.style.top = e.pageY + 'px';
            menu.style.left = Math.min(e.pageX, window.innerWidth - 150) + 'px';
            document.getElementById('del-everyone-btn').style.display = isMine ? 'block' : 'none';
            e.stopPropagation();
        };

        window.deleteMsg = async (type) => {
            const roomId = [currentUser.email, activeFriend].sort().join('_');
            const msgRef = doc(db, "chats", roomId, "messages", selectedMsgId);
            
            if(type === 'me') {
                // Sirf apne liye hide karo
                const snap = await getDoc(msgRef);
                let currentDeletedFor = snap.data().deletedFor || [];
                currentDeletedFor.push(currentUser.email);
                await updateDoc(msgRef, { deletedFor: currentDeletedFor });
            } else {
                // Hamesha ke liye DB se permanently delete kardo dono side se
                await deleteDoc(msgRef);
            }
            document.getElementById('msg-menu').style.display = 'none';
        };

        // Close menu/modals when clicking outside
        document.onclick = (e) => {
            if(!e.target.closest('.msg-menu') && !e.target.closest('.bubble')) {
                document.getElementById('msg-menu').style.display = 'none';
            }
        };

    </script>
</body>
</html>
